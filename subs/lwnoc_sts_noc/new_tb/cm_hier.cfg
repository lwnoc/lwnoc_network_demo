// Coverage hierarchy config for lwnoc_sts_noc new_tb
// Exclude DFT/CDC marker cells from coverage instrumentation
// These are zero-logic annotation cells (assign Z = I;) for DFT tools.
// Rationale: fcip_marker and fcip_clk_marker contain no functional logic,
// they are purely transparent pass-throughs inserted for CDC/DFT analysis.
// Excluding them removes thousands of untoggleable DFT annotation bits
// from the coverage denominator.

+tree top_newtb
-module fcip_marker
-module fcip_clk_marker
-module fcip_sync_arst
-module fcip_sync_aset
-module fcip_sync_cell
// CTI outbound channel from TNIU noc-side is structurally tied to 0
// (TNIU does not source CTI events outbound on the noc interface).
// The TNIU sys-side channel_in_async receives this tied-to-0 data.
-tree top_newtb.u_dut.u_tniu0.u_sts_tniu_noc.u_cti_handle_iniu_sys.u_channel_out_async
-tree top_newtb.u_dut.u_tniu1.u_sts_tniu_noc.u_cti_handle_iniu_sys.u_channel_out_async
-tree top_newtb.u_dut.u_tniu2.u_sts_tniu_noc.u_cti_handle_iniu_sys.u_channel_out_async
-tree top_newtb.u_dut.u_tniu0.u_sts_tniu_sys.u_cti_handle_iniu_sys.u_channel_in_async
-tree top_newtb.u_dut.u_tniu1.u_sts_tniu_sys.u_cti_handle_iniu_sys.u_channel_in_async
-tree top_newtb.u_dut.u_tniu2.u_sts_tniu_sys.u_cti_handle_iniu_sys.u_channel_in_async
// TNIU noc-side CTI event bridges: noc_cti_event_in='0 at DUT level,
// noc_cti_event_out (from tniu_noc) is structurally 0 (TNIU does not
// generate outbound events on the NoC interface). Both directions dead.
-tree top_newtb.u_dut.u_tniu0.u_sts_tniu_noc.u_cti_handle_iniu_sys.u_event_out_async
-tree top_newtb.u_dut.u_tniu1.u_sts_tniu_noc.u_cti_handle_iniu_sys.u_event_out_async
-tree top_newtb.u_dut.u_tniu2.u_sts_tniu_noc.u_cti_handle_iniu_sys.u_event_out_async
-tree top_newtb.u_dut.u_tniu0.u_sts_tniu_noc.u_cti_handle_iniu_sys.u_event_in_async
-tree top_newtb.u_dut.u_tniu1.u_sts_tniu_noc.u_cti_handle_iniu_sys.u_event_in_async
-tree top_newtb.u_dut.u_tniu2.u_sts_tniu_noc.u_cti_handle_iniu_sys.u_event_in_async
